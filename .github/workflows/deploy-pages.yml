name: Deploy React app to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build React app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-snake/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        working-directory: react-snake
        run: npm ci --loglevel=error

      - name: Build static app
        working-directory: react-snake
        run: npm run build

      - name: Add SPA fallback
        run: cp react-snake/dist/index.html react-snake/dist/404.html

      - name: Verify build output
        run: |
          test -f react-snake/dist/index.html
          test -f react-snake/dist/404.html
          ls -la react-snake/dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: react-snake/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v5
